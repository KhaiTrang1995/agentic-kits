apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{app_name}}
  namespace: {{namespace}}
  labels:
    app.kubernetes.io/name: {{app_name}}
    app.kubernetes.io/version: "{{version}}"
    app.kubernetes.io/component: {{backend|frontend|worker}}
    app.kubernetes.io/part-of: {{system_name}}
    app.kubernetes.io/managed-by: kubectl
    team: {{team}}
    environment: {{production|staging|dev}}
spec:
  replicas: {{replicas}}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  minReadySeconds: 10
  selector:
    matchLabels:
      app.kubernetes.io/name: {{app_name}}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{app_name}}
        app.kubernetes.io/version: "{{version}}"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: {{app_name}}
          image: {{registry}}/{{app_name}}:{{version}}
          ports:
            - containerPort: {{port}}
          envFrom:
            - configMapRef:
                name: {{app_name}}-config
            - secretRef:
                name: {{app_name}}-secret
          resources:
            requests:
              cpu: {{cpu_request}}
              memory: {{memory_request}}
            limits:
              cpu: {{cpu_limit}}
              memory: {{memory_limit}}
          livenessProbe:
            httpGet:
              path: /health/live
              port: {{port}}
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health/ready
              port: {{port}}
            initialDelaySeconds: 5
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /health/live
              port: {{port}}
            failureThreshold: 30
            periodSeconds: 10
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
