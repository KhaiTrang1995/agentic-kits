apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{app_name}}
  namespace: {{namespace}}
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: {{cluster_issuer}}
spec:
  tls:
    - hosts:
        - {{host}}
      secretName: {{app_name}}-tls
  rules:
    - host: {{host}}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{app_name}}
                port:
                  number: {{service_port}}
